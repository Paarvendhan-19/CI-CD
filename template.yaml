AWSTemplateFormatVersion: '2010-09-09'
Description: 'Experiment 3: Automated Multi-Tier Deployment (Web, App, and Database Tiers)'

Parameters:
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64'
  
  DBPassword:
    Type: String
    Description: 'Password for the RDS MySQL database'
    NoEcho: true
    Default: 'Password123'

Resources:
  WebServerSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Enable HTTP access via port 80'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  WebInstance:
    Type: 'AWS::EC2::Instance'
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: t2.micro
      SecurityGroups:
        - !Ref WebServerSecurityGroup
      # USER DATA: Array format guarantees pure Linux line endings!
      UserData:
        Fn::Base64:
          !Join
            - "\n"
            - - "#!/bin/bash"
              - "dnf update -y"
              - "dnf install -y nodejs git"
              - "git clone https://github.com/Paarvendhan-19/CI-CD.git /home/ec2-user/app"
              - "cd /home/ec2-user/app"
              - "npm install"
              - "npm install express"
              - "export PORT=80"
              - "nohup node server.js > /var/log/nodeapp.log 2>&1 &"

  AppDatabase:
    Type: 'AWS::RDS::DBInstance'
    Properties:
      AllocatedStorage: '20'
      DBInstanceClass: db.t3.micro
      Engine: mysql
      MasterUsername: admin
      MasterUserPassword: !Ref DBPassword
      PubliclyAccessible: true

Outputs:
  WebsiteURL:
    Description: 'URL of the deployed multi-tier application'
    Value: !Sub 'http://${WebInstance.PublicIp}'
