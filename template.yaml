AWSTemplateFormatVersion: '2010-09-09'
Description: 'Experiment 3: Automated Multi-Tier Deployment (Web, App, and Database Tiers)'

Parameters:
  # Automatically fetches the latest Amazon Linux 2023 AMI ID for your specific region
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64'
  
  DBPassword:
    Type: String
    Description: 'Password for the RDS MySQL database'
    NoEcho: true
    Default: 'Password123'

Resources:
  # 1. WEB TIER: Security Group (Virtual Firewall)
  # Opens Port 80 so the web application is accessible via the browser
  WebServerSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Enable HTTP access via port 80'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  # 2. WEB & APP TIER: EC2 Instance
  # Provisions the server for the web and application tiers 
  WebInstance:
    Type: 'AWS::EC2::Instance'
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: t2.micro
      SecurityGroups:
        - !Ref WebServerSecurityGroup
      # USER DATA: Automates software installation and app startup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # MAGIC LINE: Forces all script output to the EC2 System Log
          exec > >(tee /var/log/user-data.log|logger -t user-data -s 2>/dev/console) 2>&1
          
          echo "--- STARTING DEPLOYMENT ---"
          
          cd /home/ec2-user
          echo "1. Installing Node and Git..."
          dnf update -y
          dnf install -y nodejs git
          
          echo "2. Cloning Repository..."
          git clone https://github.com/Paarvendhan-19/CI-CD.git app
          
          echo "3. Installing NPM Packages..."
          cd app
          npm install
          
          echo "4. Starting Node Server..."
          export PORT=80
          nohup node server.js > /var/log/nodeapp.log 2>&1 &
          
          echo "--- DEPLOYMENT COMPLETE ---"

  # 3. DATABASE TIER: RDS MySQL Instance
  # Provisions the backend relational database
  AppDatabase:
    Type: 'AWS::RDS::DBInstance'
    Properties:
      AllocatedStorage: '20'
      DBInstanceClass: db.t3.micro
      Engine: mysql
      MasterUsername: admin
      MasterUserPassword: !Ref DBPassword
      PubliclyAccessible: true

Outputs:
  WebsiteURL:
    Description: 'URL of the deployed multi-tier application'
    Value: !Sub 'http://${WebInstance.PublicIp}'
