AWSTemplateFormatVersion: '2010-09-09'
Description: 'Full Automated Multi-Tier Deployment for Lab 3'

Resources:
  # 1. Firewall: Opens Port 80 for the Web Tier
  WebServerSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Allow HTTP traffic'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  # 2. Web Tier: EC2 Instance with Auto-Start Script
  WebInstance:
    Type: 'AWS::EC2::Instance'
    Properties:
      # Automatically gets the latest Amazon Linux 2023 AMI
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      InstanceType: t2.micro
      SecurityGroups:
        - !Ref WebServerSecurityGroup
      # This script runs automatically so you DON'T have to connect via SSH
      UserData: 
        Fn::Base64: |
          #!/bin/bash
          sudo dnf update -y
          sudo dnf install -y nodejs
          # Create a simple app directly on the server to verify the Web Tier
          echo "const http = require('http');
          http.createServer((req, res) => {
            res.writeHead(200, { 'Content-Type': 'text/html' });
            res.end('<h1>Experiment 3: Multi-Tier Automation Successful!</h1><p>Web Tier: Online</p>');
          }).listen(80);" > app.js
          sudo node app.js &

  # 3. Database Tier: RDS Instance
  AppDatabase:
    Type: 'AWS::RDS::DBInstance'
    Properties:
      AllocatedStorage: '20'
      DBInstanceClass: db.t3.micro
      Engine: mysql
      MasterUsername: admin
      MasterUserPassword: Password123
      PubliclyAccessible: true
